# Netlify Build Configuration for Next.js 13.5.1

[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22.16.0"
  NPM_VERSION = "10.9.2"
  NPM_FLAGS = "--legacy-peer-deps"

# Next.js specific settings
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects for Next.js App Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Enforce HTTPS for 1 year; include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP: allow same-origin + trusted CDNs; tighten as needed per feature
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.neon.tech; frame-ancestors 'none';"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Scheduled functions declare their cron schedules in-code via the exported
# `config` in netlify/functions/*.ts (single source of truth):
#   scheduled-analytics       — daily milestone auto-completion (02:00 UTC)
#   scheduled-cleanup         — weekly notification cleanup (Sun 03:00 UTC)
#   scheduled-yearly-rollover — clone groups into the new year (Jan 1 00:15 UTC)
